name: Build Void Packages

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package names to build"
        required: true
        type: string
      void_packages_ref:
        description: "void-packages ref to build against"
        required: true
        type: string
        default: master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/void-linux/void-glibc-full:latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out overlay repo
        uses: actions/checkout@v5

      - name: Install container tools
        shell: sh
        run: |
          xbps-install -Suy bash git rsync shadow xbps

      - name: Clone upstream void-packages
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ inputs.void_packages_ref }}" \
            https://github.com/void-linux/void-packages.git void-packages

      - name: Overlay custom packages
        shell: bash
        run: |
          rsync -a srcpkgs/ void-packages/srcpkgs/
          if [ -d common ]; then
            rsync -a common/ void-packages/common/
          fi

      - name: Configure xbps-src
        working-directory: void-packages
        shell: bash
        run: |
          cat >> etc/conf <<'EOF'
          XBPS_ALLOW_RESTRICTED=yes
          XBPS_CHROOT_CMD=ethereal
          XBPS_CCACHE=yes
          EOF

      - name: Restore distfiles cache
        uses: actions/cache@v4
        with:
          path: void-packages/hostdir/sources
          key: void-sources-x86_64-${{ inputs.void_packages_ref }}-${{ hashFiles('srcpkgs/**/template', 'srcpkgs/**/files/**', 'common/shlibs') }}
          restore-keys: |
            void-sources-x86_64-${{ inputs.void_packages_ref }}-
            void-sources-x86_64-
            void-sources-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: void-packages/hostdir/ccache
          key: void-ccache-x86_64-${{ inputs.void_packages_ref }}
          restore-keys: |
            void-ccache-x86_64-${{ inputs.void_packages_ref }}
            void-ccache-x86_64-
            void-ccache-

      - name: Create build user
        shell: bash
        run: |
          useradd -m -s /bin/bash builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          mkdir -p /tmp/xbps-src
          chown -R builder:builder /tmp/xbps-src

      - name: Build packages
        shell: bash
        run: |
          su builder -c '
            set -euxo pipefail
            cd "$GITHUB_WORKSPACE/void-packages"
            mkdir -p hostdir/sources hostdir/ccache
            export HOME=/home/builder
            ./xbps-src -m ethereal binary-bootstrap
            for pkg in ${{ inputs.packages }}; do
              ./xbps-src -m ethereal pkg "$pkg"
            done
          '

      - name: Show built packages
        shell: bash
        run: |
          find void-packages/hostdir/binpkgs -type f | sort

      - name: Upload binpkgs artifact
        uses: actions/upload-artifact@v4
        with:
          name: void-binpkgs-x86_64-${{ github.run_number }}
          path: void-packages/hostdir/binpkgs
          if-no-files-found: error
          retention-days: 14
